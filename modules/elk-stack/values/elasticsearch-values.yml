# Elasticsearch Values
replicas: ${replicas}

minimumMasterNodes: 1

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "1000m"
    memory: "4Gi"

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ${storage_class_name}
  resources:
    requests:
      storage: ${storage_size}

esJavaOpts: "${java_opts}"

protocol: http

httpPort: 9200
transportPort: 9300

service:
  type: ClusterIP
  httpPortName: http
  transportPortName: transport

antiAffinity: "soft"

esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false
    xpack.monitoring.collection.enabled: true

extraEnvs:
  - name: ELASTIC_PASSWORD
    valueFrom:
      secretKeyRef:
        name: elasticsearch-master-credentials
        key: password
        optional: true

sysctlInitContainer:
  enabled: true

persistence:
  enabled: true
