grafana:
  adminPassword: "${password}"
  persistence:
    enabled: true
    storageClassName: "${sc}"
    size: 5Gi
  service:
    type: NodePort
    nodePort: 30300
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  sidecar:
    dashboards:
      enabled: true
