apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress
  namespace: dev
spec: 
  rules:
    - host: myapp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: 
              service:
                name: myapp-nginx
                port: 
                  number: 80
